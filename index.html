<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramez Tech | متجر الشحن الرقمي المتقدم</title>
    <base href="./">
    <style>
/* Ramez Tech - Futuristic Theme */
:root {
    --bg-main: #0a0b10;
    --bg-card: #121420;
    --accent: #00f2fe;
    --accent-glow: rgba(0, 242, 254, 0.25);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --success: #00e676;
    --border-color: rgba(255, 255, 255, 0.05);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    direction: rtl;
    text-align: right;
    overflow-x: hidden;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 5%;
    background: rgba(10, 11, 16, 0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    font-size: 1.6rem;
    font-weight: bold;
    color: var(--text-main);
    letter-spacing: 1px;
}

.logo span {
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent-glow);
}

.nav-auth {
    display: flex;
    gap: 1rem;
    align-items: center;
}

/* Hero Section */
.hero {
    text-align: center;
    padding: 6rem 1rem;
    position: relative;
    background: radial-gradient(circle at center, rgba(0, 242, 254, 0.08) 0%, transparent 60%);
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
    font-weight: 800;
}

.hero h1 span {
    color: var(--accent);
    text-shadow: 0 0 15px var(--accent-glow);
}

.hero p {
    color: var(--text-muted);
    font-size: 1.2rem;
    max-width: 600px;
    margin: 0 auto;
}

/* Catalog Grid */
.catalog-container {
    padding: 2rem 5% 6rem;
}

.section-title {
    font-size: 1.8rem;
    margin-bottom: 2rem;
    position: relative;
    display: inline-block;
}

.section-title::after {
    content: '';
    position: absolute;
    bottom: -6px;
    right: 0;
    width: 40px;
    height: 3px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
}

.services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
}

/* Service Cards */
.card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: translateY(-8px);
    border-color: var(--accent);
    box-shadow: 0 12px 30px rgba(0, 242, 254, 0.1);
}

.card-banner {
    position: relative;
    height: 180px;
    background: linear-gradient(45deg, #1e293b, #0f172a);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.card-banner::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(transparent, var(--bg-card));
    z-index: 1;
}

.card-banner-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
}

.card:hover .card-banner-img {
    transform: scale(1.05);
}

.card-banner-icon {
    font-size: 3rem;
    z-index: 2;
}

.card-body {
    padding: 1.5rem;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
}

.card-title {
    font-size: 1.3rem;
    margin-bottom: 0.5rem;
}

.card-desc {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
    line-height: 1.4;
    flex-grow: 1;
}

.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.price {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
}

/* Buttons */
.btn {
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    text-decoration: none;
}

.btn-primary {
    background: var(--accent);
    color: #000;
}

.btn-primary:hover {
    box-shadow: 0 0 15px var(--accent);
    transform: scale(1.02);
}

.btn-outline {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
}

.btn-outline:hover {
    background: rgba(0, 242, 254, 0.1);
}

/* Modals (Popup) */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.modal {
    background: var(--bg-card);
    border: 1px solid rgba(0, 242, 254, 0.2);
    padding: 2.5rem;
    border-radius: 20px;
    width: 90%;
    max-width: 450px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    transform: scale(0.9);
    transition: transform 0.3s ease;
}

.modal-overlay.active .modal {
    transform: scale(1);
}

.modal-title {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
}

.form-group {
    margin-bottom: 1.25rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
    font-size: 0.9rem;
}

.form-input {
    width: 100%;
    padding: 0.8rem 1rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-input:focus {
    outline: none;
    border-color: var(--accent);
}

.close-btn {
    position: absolute;
    top: 1.5rem;
    left: 1.5rem;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
}

/* Category tabs */
.category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 2rem;
    justify-content: center;
}

.category-tab {
    padding: 0.5rem 1.2rem;
    border-radius: 999px;
    border: 1px solid var(--border-color);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
}

.category-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.category-tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
}

/* Card category label */
.card-category {
    font-size: 0.75rem;
    color: var(--accent);
    margin-bottom: 0.4rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Quantity & total */
#orderQuantity {
    width: 100%;
    text-align: center;
}

.total-price {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--success);
    margin-top: 0.75rem;
    text-align: center;
}

/* Responsive */
@media (max-width: 600px) {
    .hero h1 {
        font-size: 2rem;
    }
    .navbar {
        padding: 1rem 4%;
    }
    .nav-auth {
        gap: 0.5rem;
    }
}

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">RAMEZ<span>_TECH</span></div>
        <div class="nav-auth" id="navAuthSection">
            <button class="btn btn-outline" onclick="openModal('loginModal')">تسجيل الدخول</button>
        </div>
    </nav>

    <header class="hero">
        <h1>منصة الشحن <span>المستقبلية</span></h1>
        <p>بوابتك الفورية لشحن الألعاب والحزم الرقمية بسرعة فائقة وأمان مالي مطلق.</p>
    </header>

    <main class="catalog-container">
        <h2 class="section-title">الخدمات المتوفرة</h2>

        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">الكل</button>
        </div>

        <div class="services-grid" id="servicesGrid">
            <p style="color: var(--text-muted);">جاري الاتصال بالسيرفر وجلب الخدمات الحية...</p>
        </div>
    </main>

    <!-- Order Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('orderModal')">✕</button>
            <h3 class="modal-title" id="orderModalTitle">شحن الخدمة</h3>
            <div class="form-group">
                <label for="targetPlayerId">معرّف اللاعب (Player ID)</label>
                <input type="text" id="targetPlayerId" class="form-input" placeholder="أدخل رقم الـ ID هنا">
            </div>
            <div class="form-group">
                <label for="orderQuantity">الكمية</label>
                <input type="number" id="orderQuantity" class="form-input" min="1" value="1" onchange="updateOrderTotal()">
            </div>
            <div class="total-price" id="orderTotal">المجموع: $0.00</div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="confirmOrderBtn">تأكيد طلب الشحن الفوري</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('loginModal')">✕</button>
            <h3 class="modal-title">ولوج بوابة المستخدم</h3>
            <div class="form-group">
                <label for="loginUser">اسم المستخدم</label>
                <input type="text" id="loginUser" class="form-input" placeholder="username">
            </div>
            <div class="form-group">
                <label for="loginPass">كلمة المرور</label>
                <input type="password" id="loginPass" class="form-input" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="handleLogin()">دخول آمن</button>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-muted);">
                ليس لديك حساب؟ <a href="#" onclick="closeModal('loginModal'); openModal('registerModal');" style="color: var(--accent);">سجّل الآن</a>
            </p>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('registerModal')">✕</button>
            <h3 class="modal-title">إنشاء حساب جديد</h3>
            <div class="form-group">
                <label for="registerUser">اسم المستخدم</label>
                <input type="text" id="registerUser" class="form-input" placeholder="username">
            </div>
            <div class="form-group">
                <label for="registerEmail">البريد الإلكتروني</label>
                <input type="email" id="registerEmail" class="form-input" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label for="registerPass">كلمة المرور</label>
                <input type="password" id="registerPass" class="form-input" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="handleRegister()">تسجيل</button>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-muted);">
                لديك حساب؟ <a href="#" onclick="closeModal('registerModal'); openModal('loginModal');" style="color: var(--accent);">تسجيل الدخول</a>
            </p>
        </div>
    </div>

    <script>
// Auto-detect the base path so the app works when hosted under a sub-path
// (e.g. /topup-store/ or /)
const API_BASE_URL = (() => {
    let p = window.location.pathname;
    if (p.endsWith("index.html")) p = p.replace(/index\.html$/i, "");
    if (!p.endsWith("/")) p += "/";
    return p;
})();

let currentSelectedService = null;
let userToken = localStorage.getItem("user_token") || null;
let allServices = [];
let allCategories = [];
let currentCategory = "all";

document.addEventListener("DOMContentLoaded", () => {
    fetchCategoriesAndServices();
    updateAuthNavbar();

    document.getElementById("confirmOrderBtn").addEventListener("click", handleOrder);
});

// Helpers
function getCategoryIcon(categoryName) {
    const name = (categoryName || "").toLowerCase();
    if (name.includes("game") || name.includes("ألعاب") || name.includes("ببجي") || name.includes("pubg")) return "🎮";
    if (name.includes("social") || name.includes("سوشيال") || name.includes("media")) return "📱";
    if (name.includes("music") || name.includes("موسيقى")) return "🎵";
    if (name.includes("video") || name.includes("فيديو")) return "🎬";
    if (name.includes("gift") || name.includes("بطاقة")) return "🎁";
    return "✨";
}

function formatMoney(value) {
    const num = Number(value);
    if (isNaN(num)) return value;
    return num.toFixed(2);
}

function getImageUrl(imageUrl) {
    if (!imageUrl) return null;
    if (imageUrl.startsWith("http")) return imageUrl;
    // Strip a leading slash so it becomes relative to the current base path
    let src = imageUrl.startsWith("/") ? imageUrl.slice(1) : imageUrl;
    return `${API_BASE_URL}${src}`;
}

// Fetch categories and services
async function fetchCategoriesAndServices() {
    try {
        const [catRes, svcRes] = await Promise.all([
            fetch(`${API_BASE_URL}categories/`),
            fetch(`${API_BASE_URL}services/?active_only=true`),
        ]);

        if (!catRes.ok || !svcRes.ok) throw new Error("فشل في جلب البيانات");

        allCategories = await catRes.json();
        allServices = await svcRes.json();

        renderCategoryTabs();
        renderServices();
    } catch (error) {
        document.getElementById("servicesGrid").innerHTML = `<p style="color: #ef4444;">عذراً، تعذر الاتصال بالسيرفر. تأكد من تشغيل سيرفر البايثون.</p>`;
    }
}

function renderCategoryTabs() {
    const tabsContainer = document.getElementById("categoryTabs");
    tabsContainer.innerHTML = `<button class="category-tab active" data-category="all">الكل</button>`;

    allCategories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "category-tab";
        btn.dataset.category = cat.name;
        btn.textContent = cat.name;
        btn.onclick = () => setCategory(cat.name);
        tabsContainer.appendChild(btn);
    });

    Array.from(tabsContainer.children).forEach(btn => {
        btn.onclick = () => setCategory(btn.dataset.category);
    });
}

function setCategory(category) {
    currentCategory = category;
    document.querySelectorAll(".category-tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.category === category);
    });
    renderServices();
}

function renderServices() {
    const grid = document.getElementById("servicesGrid");
    grid.innerHTML = "";

    const services = currentCategory === "all"
        ? allServices
        : allServices.filter(s => (s.category_name || "General") === currentCategory);

    if (services.length === 0) {
        grid.innerHTML = `<p style="color: var(--text-muted);">لا توجد خدمات نشطة في هذه الفئة.</p>`;
        return;
    }

    services.forEach(service => {
        const icon = getCategoryIcon(service.category_name);
        const imageUrl = getImageUrl(service.image_url);
        const banner = imageUrl
            ? `<img src="${imageUrl}" alt="${service.name}" class="card-banner-img" loading="lazy">`
            : `<div class="card-banner-icon">${icon}</div>`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-banner">${banner}</div>
            <div class="card-body">
                <div class="card-category">${service.category_name || "عام"}</div>
                <h4 class="card-title">${service.name}</h4>
                <p class="card-desc">شحن فوري ومؤمن تلقائياً عبر معرف اللاعب الخاص بك.</p>
                <div class="card-footer">
                    <span class="price">$${formatMoney(service.price)}</span>
                    <button class="btn btn-primary" onclick="initiatePurchase(${service.id}, '${service.name.replace(/'/g, "\\'")}', '${service.price}')">شراء الآن</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

// Modals
function openModal(modalId) {
    document.getElementById(modalId).classList.add("active");
}

function closeModal(modalId) {
    document.getElementById(modalId).classList.remove("active");
}

function initiatePurchase(serviceId, serviceName, price) {
    if (!userToken) {
        alert("يرجى تسجيل الدخول أولاً لتتمكن من الشحن من رصيد محفظتك.");
        openModal("loginModal");
        return;
    }

    const service = allServices.find(s => s.id === serviceId);
    if (!service) return;

    currentSelectedService = service;
    document.getElementById("orderModalTitle").innerText = `شحن: ${service.name}`;
    document.getElementById("orderQuantity").value = 1;
    document.getElementById("targetPlayerId").value = "";
    updateOrderTotal();
    openModal("orderModal");
}

function updateOrderTotal() {
    if (!currentSelectedService) return;
    const quantity = Math.max(1, parseInt(document.getElementById("orderQuantity").value) || 1);
    const unitPrice = Number(currentSelectedService.price) || 0;
    const total = unitPrice * quantity;
    document.getElementById("orderTotal").innerText = `المجموع: $${total.toFixed(2)} (${quantity} × $${unitPrice.toFixed(2)})`;
}

// Auth
async function handleLogin() {
    const user = document.getElementById("loginUser").value;
    const pass = document.getElementById("loginPass").value;

    const formData = new FormData();
    formData.append("username", user);
    formData.append("password", pass);

    try {
        const response = await fetch(`${API_BASE_URL}auth/login`, {
            method: "POST",
            body: formData,
        });

        if (!response.ok) throw new Error();
        const data = await response.json();

        localStorage.setItem("user_token", data.access_token);
        userToken = data.access_token;

        closeModal("loginModal");
        alert("تم الولوج بنجاح!");
        updateAuthNavbar();
    } catch (error) {
        alert("فشل تسجيل الدخول، تأكد من اسم المستخدم أو كلمة المرور.");
    }
}

async function handleRegister() {
    const username = document.getElementById("registerUser").value;
    const email = document.getElementById("registerEmail").value;
    const password = document.getElementById("registerPass").value;

    if (!username || !email || !password) {
        alert("يرجى ملء جميع الحقول.");
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password }),
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail || "فشل التسجيل");
        }

        alert("تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.");
        closeModal("registerModal");
        openModal("loginModal");
    } catch (error) {
        alert(error.message || "فشل التسجيل.");
    }
}

async function updateAuthNavbar() {
    const authSection = document.getElementById("navAuthSection");
    if (!userToken) {
        authSection.innerHTML = `
            <button class="btn btn-outline" onclick="openModal('loginModal')">تسجيل الدخول</button>
            <button class="btn btn-primary" onclick="openModal('registerModal')">إنشاء حساب</button>
        `;
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}auth/me`, {
            headers: { "Authorization": `Bearer ${userToken}` }
        });
        if (!response.ok) throw new Error();
        const user = await response.json();

        authSection.innerHTML = `
            <div style="text-align: left;">
                <div style="font-size: 0.8rem; color: var(--text-muted);">المحفظة الرقمية</div>
                <div style="color: var(--success); font-weight: bold; font-size: 1.1rem;">$${formatMoney(user.balance)}</div>
            </div>
            <button class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.8rem;" onclick="handleLogout()">خروج</button>
        `;
    } catch (error) {
        handleLogout();
    }
}

function handleLogout() {
    localStorage.removeItem("user_token");
    userToken = null;
    updateAuthNavbar();
}

// Order
async function handleOrder() {
    const playerId = document.getElementById("targetPlayerId").value.trim();
    const quantity = Math.max(1, parseInt(document.getElementById("orderQuantity").value) || 1);

    if (!playerId) {
        alert("الرجاء إدخال معرف اللاعب أولاً.");
        return;
    }

    if (!currentSelectedService) return;

    try {
        const response = await fetch(`${API_BASE_URL}orders/`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${userToken}`
            },
            body: JSON.stringify({
                service_id: currentSelectedService.id,
                target_player_id: playerId,
                quantity: quantity,
            })
        });

        const result = await response.json();

        if (!response.ok) {
            throw new Error(result.detail || "فشل إتمام عملية الشحن.");
        }

        alert(`تم قبول طلب الشحن بنجاح! رقم الطلب: ${result.id}`);
        closeModal("orderModal");
        document.getElementById("targetPlayerId").value = "";
        updateAuthNavbar();
    } catch (error) {
        alert(error.message);
    }
}

</script>
</body>
</html>
